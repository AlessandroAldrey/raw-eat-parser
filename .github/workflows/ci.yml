name: Continuous Integration

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Job 1: Linting and Code Quality (Protected against CRLF line-ending issues)
  lint:
    name: Lint & Formatting (Windows)
    runs-on: windows-latest
    steps:
      - name: Configure Git Line Endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy linter
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Job 2: Security Vulnerability Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall (Direct Binary)
        run: |
          curl -L https://github.com/cargo-bins/cargo-binstall/releases/latest/download/cargo-binstall-x86_64-unknown-linux-musl.tgz | tar -xvzf -
          sudo mv cargo-binstall /usr/local/bin/

      - name: Install cargo-audit via binstall
        run: cargo binstall --force cargo-audit -y

      - name: Run Audit
        run: cargo audit

  # Job 3: Native Test Execution
  test:
    name: Windows Test Suite
    needs: [lint, security]
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust dependency cache
        uses: Swatinem/rust-cache@v2

      - name: Run native Windows tests
        run: cargo test --all-features --workspace